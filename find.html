<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>P-11 // TERMINAL GATEWAY</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background: #050505; color: #F5F5F5; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .radar-box { text-align: center; width: 100%; max-width: 400px; padding: 20px; }
        
        .scanner { width: 180px; height: 180px; border: 1px solid #1A1A1A; border-radius: 50%; margin: 0 auto 40px; position: relative; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .scanner.found { border-color: #a855f7; box-shadow: 0 0 30px rgba(168, 85, 247, 0.2); }
        .scanner::after { content: ''; width: 100%; height: 100%; border: 1px solid #a855f7; border-radius: 50%; position: absolute; animation: pulse 2s infinite; opacity: 0; }
        @keyframes pulse { 0% { transform: scale(0.6); opacity: 0; } 50% { opacity: 0.4; } 100% { transform: scale(1.3); opacity: 0; } }
        
        #status { font-size: 10px; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        #ip-info { font-size: 16px; color: #a855f7; font-weight: bold; margin-top: 5px; letter-spacing: 2px; cursor: pointer; }
        
        /* КНОПКИ */
        .controls { display: none; flex-direction: column; gap: 15px; margin-top: 40px; animation: fadeIn 0.5s forwards; }
        .access-btn { 
            padding: 20px 40px; border: 1px solid #a855f7; background: #a855f7; 
            color: #000; text-decoration: none; font-size: 11px; 
            font-weight: 900; letter-spacing: 2px; transition: 0.3s;
        }
        .copy-btn { 
            padding: 12px 20px; border: 1px solid #333; background: transparent; 
            color: #555; text-decoration: none; font-size: 9px; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; cursor: pointer;
        }
        .copy-btn:hover { color: #fff; border-color: #fff; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .error-note { display: none; font-size: 9px; color: #444; margin-top: 30px; line-height: 1.6; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="radar-box">
    <div class="scanner" id="scannerCircle">
        <div>
            <div id="status">SCANNING...</div>
            <div id="ip-info">---.---.---.---</div>
        </div>
    </div>

    <div class="controls" id="controls">
        <a href="#" id="accessBtn" target="_blank" class="access-btn">OPEN TERMINAL</a>
        <button onclick="copyIP()" class="copy-btn">Copy IP to clipboard</button>
        <div class="error-note" id="errorNote">
            If "OPEN" doesn't work: Browser blocked the bridge.<br>
            Please paste the copied IP into a new tab.
        </div>
    </div>
</div>

<script>
    const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt'; 
    const TOPIC = 'p11/discovery/inspiratus';

    const client = mqtt.connect(MQTT_BROKER);
    const statusEl = document.getElementById('status');
    const ipEl = document.getElementById('ip-info');
    const controls = document.getElementById('controls');
    const accessBtn = document.getElementById('accessBtn');
    const scannerCircle = document.getElementById('scannerCircle');
    const errorNote = document.getElementById('errorNote');

    client.on('connect', () => {
        statusEl.innerText = "SENSORS ONLINE";
        client.subscribe(TOPIC);
    });

    client.on('message', (topic, message) => {
        if (topic === TOPIC) {
            const ip = message.toString();
            
            scannerCircle.classList.add('found');
            statusEl.innerText = "ARTIFACT LOCATED";
            statusEl.style.color = "#a855f7";
            ipEl.innerText = ip;

            accessBtn.href = "http://" + ip;
            controls.style.display = "flex";
            errorNote.style.display = "block";
            
            scannerCircle.style.animation = "none";
        }
    });

    function copyIP() {
        const ip = ipEl.innerText;
        navigator.clipboard.writeText(ip).then(() => {
            const oldText = document.querySelector('.copy-btn').innerText;
            document.querySelector('.copy-btn').innerText = "COPIED TO CLIPBOARD";
            setTimeout(() => {
                document.querySelector('.copy-btn').innerText = oldText;
            }, 2000);
        });
    }

    setTimeout(() => {
        if (controls.style.display !== "flex") {
            statusEl.innerText = "NO SIGNAL";
            statusEl.style.color = "#ff3e3e";
        }
    }, 20000);
</script>
</body>
</html>
