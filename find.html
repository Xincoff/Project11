<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P-11 // TERMINAL GATEWAY</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #050505; 
            color: #F5F5F5; 
            font-family: 'JetBrains Mono', monospace; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        .radar-box { 
            text-align: center; 
            width: 100%; 
            max-width: 450px; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* СКАНЕР - АДАПТИВНЫЙ РАЗМЕР */
        .scanner { 
            width: 260px; 
            height: 260px; 
            border: 1px solid #1A1A1A; 
            border-radius: 50%; 
            margin-bottom: 40px; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.5s;
        }
        
        .scanner::after { 
            content: ''; 
            width: 100%; 
            height: 100%; 
            border: 1px solid #a855f7; 
            border-radius: 50%; 
            position: absolute; 
            animation: pulse 2.5s infinite; 
            opacity: 0; 
        }

        @keyframes pulse { 
            0% { transform: scale(0.6); opacity: 0; } 
            50% { opacity: 0.3; } 
            100% { transform: scale(1.3); opacity: 0; } 
        }
        
        #status { 
            font-size: 10px; 
            letter-spacing: 4px; 
            color: #444; 
            text-transform: uppercase; 
            transition: 0.3s;
        }

        /* СПИСОК УСТРОЙСТВ */
        .device-list { 
            width: 100%;
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .device-card { 
            padding: 22px; 
            border: 1px solid #1A1A1A; 
            background: #080808; 
            text-align: left; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: 0.3s;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .device-card:active {
            border-color: #a855f7;
            background: #0c0c0c;
        }
        
        .device-info h4 { 
            font-size: 12px; 
            color: #fff; 
            margin-bottom: 4px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .device-info p { 
            font-size: 12px; 
            color: #a855f7; 
            font-weight: bold; 
        }
        
        .open-btn { 
            padding: 12px 24px; 
            border: 1px solid #a855f7; 
            color: #a855f7; 
            text-decoration: none; 
            font-size: 11px; 
            font-weight: 900;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .open-btn:active {
            background: #a855f7;
            color: #000;
        }

        .rescan { 
            margin-top: 50px; 
            background: none; 
            border: none; 
            color: #222; 
            font-size: 10px; 
            cursor: pointer; 
            text-transform: uppercase; 
            text-decoration: underline;
            font-family: inherit;
            letter-spacing: 2px;
        }

        /* МЕДИА-ЗАПРОСЫ ДЛЯ МАЛЕНЬКИХ ЭКРАНОВ */
        @media (max-width: 380px) {
            .scanner { width: 200px; height: 200px; }
            .device-card { padding: 15px; }
            .open-btn { padding: 10px 18px; font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="radar-box">
    <div class="scanner" id="scannerCircle">
        <div id="status">SCANNING MESH</div>
    </div>

    <div class="device-list" id="list">
        <!-- Сюда падают карточки -->
    </div>

    <button class="rescan" onclick="location.reload()">Reset Sensors</button>
</div>

<script>
    // Подключение к публичному брокеру через WebSockets
    const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
    const listEl = document.getElementById('list');
    const statusEl = document.getElementById('status');
    const devices = {};

    client.on('connect', () => { 
        statusEl.innerText = "SENSORS ACTIVE"; 
        client.subscribe('p11/discovery/inspiratus/#'); 
    });

    client.on('message', (topic, msg) => {
        const id = topic.split('/').pop();
        const payload = msg.toString();

        if (payload === "OFFLINE") { 
            delete devices[id]; 
        } else { 
            devices[id] = payload; 
        }
        
        render();
    });

    function render() {
        listEl.innerHTML = '';
        const keys = Object.keys(devices);
        
        if (keys.length === 0) { 
            statusEl.innerText = "NO NODES ACTIVE";
            statusEl.style.color = "#444";
            return; 
        }

        keys.forEach(id => {
            const div = document.createElement('div');
            div.className = 'device-card';
            div.innerHTML = `
                <div class="device-info">
                    <h4>${id.replace('Inspiratus_', 'ID: ')}</h4>
                    <p>${devices[id]}</p>
                </div>
                <a href="http://${devices[id]}" class="open-btn">CONNECT</a>
            `;
            listEl.appendChild(div);
        });

        statusEl.innerText = "NODES ONLINE: " + keys.length;
        statusEl.style.color = "#a855f7";
    }
</script>
</body>
</html>
