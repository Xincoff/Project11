<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-11 // TERMINAL GATEWAY</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #F5F5F5; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .radar-box { text-align: center; width: 100%; max-width: 500px; padding: 40px 20px; }
        .scanner { width: 200px; height: 200px; border: 1px solid #1A1A1A; border-radius: 50%; margin: 0 auto 40px; position: relative; display: flex; align-items: center; justify-content: center; }
        .scanner::after { content: ''; width: 100%; height: 100%; border: 1px solid #a855f7; border-radius: 50%; position: absolute; animation: pulse 2.5s infinite; opacity: 0; }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 0; } 50% { opacity: 0.3; } 100% { transform: scale(1.4); opacity: 0; } }
        #status { font-size: 10px; letter-spacing: 4px; color: #444; text-transform: uppercase; }
        
        .device-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .device-card { padding: 20px; border: 1px solid #1A1A1A; background: #080808; text-align: left; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .device-card:hover { border-color: #a855f7; }
        .device-info h4 { font-size: 11px; color: #fff; margin-bottom: 4px; letter-spacing: 1px; }
        .device-info p { font-size: 12px; color: #a855f7; font-weight: bold; }
        .open-btn { padding: 10px 20px; border: 1px solid #a855f7; color: #a855f7; text-decoration: none; font-size: 10px; font-weight: 900; }
        .open-btn:hover { background: #a855f7; color: #000; }
    </style>
</head>
<body>

<div class="radar-box">
    <div class="scanner">
        <div id="status">SCANNING MESH</div>
    </div>
    <div class="device-list" id="deviceList"></div>
</div>

<script>
    const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt'; 
    // ПОДПИСЫВАЕМСЯ НА ВСЕ УСТРОЙСТВА ЧЕРЕЗ /#
    const DISCOVERY_ROOT = 'p11/discovery/inspiratus/#';

    const client = mqtt.connect(MQTT_BROKER);
    const deviceListEl = document.getElementById('deviceList');
    const statusEl = document.getElementById('status');
    const foundDevices = {}; // Объект для отслеживания по ID

    client.on('connect', () => {
        statusEl.innerText = "SENSORS ACTIVE";
        client.subscribe(DISCOVERY_ROOT);
    });

    client.on('message', (topic, message) => {
        // Извлекаем ID из топика (p11/discovery/inspiratus/ID)
        const parts = topic.split('/');
        const deviceID = parts[parts.length - 1];
        const ip = message.toString();

        // Если это новое устройство или IP изменился
        if (!foundDevices[deviceID] || foundDevices[deviceID] !== ip) {
            foundDevices[deviceID] = ip;
            updateUI();
        }
    });

    function updateUI() {
        deviceListEl.innerHTML = '';
        Object.keys(foundDevices).forEach(id => {
            const ip = foundDevices[id];
            const card = document.createElement('div');
            card.className = 'device-card';
            card.innerHTML = `
                <div class="device-info">
                    <h4>${id.toUpperCase()}</h4>
                    <p>${ip}</p>
                </div>
                <a href="http://${ip}" target="_blank" class="open-btn">CONNECT</a>
            `;
            deviceListEl.appendChild(card);
        });
        statusEl.innerText = "NODES LOCATED: " + Object.keys(foundDevices).length;
        statusEl.style.color = "#a855f7";
    }
</script>
</body>
</html>
